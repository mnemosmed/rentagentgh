<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF5A5F" />
    <title>Offline — RentAgentGhana</title>
    <style>
      :root {
        --pop: #ff5a5f;
        --navy: #0b132b;
        --gray: #edf2f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--navy);
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 90, 95, 0.12), transparent 42%),
          #fff;
      }
      .card {
        width: min(28rem, 100%);
        text-align: center;
        padding: 2rem 1.5rem;
        border: 1px solid #d8e0ea;
        border-radius: 1.25rem;
        background: #fff;
        box-shadow: 0 10px 40px rgba(11, 19, 43, 0.07);
      }
      .logo {
        display: inline-grid;
        place-items: center;
        width: 3rem;
        height: 3rem;
        margin-bottom: 1rem;
        border-radius: 0.75rem;
        background: var(--pop);
        color: #fff;
        font-weight: 800;
        font-size: 0.85rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        font-weight: 800;
      }
      p {
        margin: 0 0 1.25rem;
        color: rgba(11, 19, 43, 0.6);
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: var(--pop);
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.75rem 1.35rem;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">RG</div>
      <h1>You’re offline</h1>
      <p>
        RentAgentGhana needs a connection to search agents and load messages. Check your
        network, then try again.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
