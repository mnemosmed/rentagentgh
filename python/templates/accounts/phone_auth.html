{% extends "base.html" %}
{% block title %}Phone sign-in — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container" style="padding:3rem 1rem;max-width:24rem;">
  <h1 class="text-center">Sign in with phone</h1>
  {% if step == "verify" %}
  <div class="card" style="margin-top:1.5rem;">
    <p class="text-muted">Code sent to {{ phone }}</p>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="action" value="verify">
      <input type="hidden" name="phone" value="{{ phone }}">
      <div class="form-group">
        <label class="label">Verification code</label>
        <input type="text" name="otp" class="input" maxlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Verify</button>
    </form>
  </div>
  {% else %}
  <div class="card" style="margin-top:1.5rem;">
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="action" value="send">
      <div class="form-group">
        <label class="label">Phone number</label>
        <input type="text" name="phone" class="input" placeholder="+233..." required>
      </div>
      <div class="form-group">
        <label class="label">First name (optional)</label>
        <input type="text" name="first_name" class="input">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Send code</button>
    </form>
  </div>
  {% endif %}
</div>
{% endblock %}
