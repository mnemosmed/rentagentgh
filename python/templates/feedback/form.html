{% extends "base.html" %}
{% block title %}Feedback — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container" style="padding:3rem 1rem;max-width:28rem;">
  <h1 class="text-center">How are we doing?</h1>
  {% if feedback.display_name %}<p class="text-center text-muted">Hi {{ feedback.display_name }}!</p>{% endif %}
  <div class="card" style="margin-top:1.5rem;">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="label">Overall rating (1–5)</label>
        <input type="number" name="rating" class="input" min="1" max="5" required>
      </div>
      <div class="form-group">
        <label class="label">What's going well?</label>
        <textarea name="going_well" class="textarea"></textarea>
      </div>
      <div class="form-group">
        <label class="label">Was RentAgentGhana helpful?</label>
        <label><input type="radio" name="platform_helpful" value="true" required> Yes</label>
        <label style="margin-left:1rem;"><input type="radio" name="platform_helpful" value="false"> No</label>
      </div>
      <div class="form-group">
        <label class="label">What could we improve?</label>
        <textarea name="improvement" class="textarea"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Submit</button>
    </form>
  </div>
</div>
{% endblock %}
