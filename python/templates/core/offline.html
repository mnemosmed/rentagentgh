{% extends "base.html" %}

{% block title %}Offline · {{ SITE_NAME }}{% endblock %}

{% block content %}
<main class="container offline-page">
  <section class="settings-card text-center">
    <h1>You're offline</h1>
    <p class="text-muted">
      RentAgentGhana needs an internet connection to search agents and send
      requests. Check your connection and try again.
    </p>
    <p>
      <a href="{% url 'core:home' %}" class="btn btn-primary">Retry</a>
    </p>
  </section>
</main>
{% endblock %}
