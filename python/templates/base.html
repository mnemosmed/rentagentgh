<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Find trusted rental agents in Accra by neighborhood.{% endblock %}">
  <link rel="stylesheet" href="/static/css/main.css">

  {% load static %}
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#16804a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RentAgent">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32.png' %}">
  <link rel="apple-touch-icon" href="{% static 'icons/apple-touch-icon.png' %}">

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "includes/navbar.html" %}

  {% if messages %}
  <div class="container">
    {% for message in messages %}
    <div class="messages-flash {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

  <footer>
    <div class="container text-center">
      <p>Copyright {% now "Y" %} {{ SITE_NAME }}</p>
    </div>
  </footer>
  <button type="button" id="pwa-install-btn" class="btn btn-primary pwa-install-btn" hidden>Install app</button>

  <script src="/static/js/area-search.js" defer></script>
  <script>
    // Service worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function (err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
    // Install prompt (Add to Home Screen)
    (function () {
      var deferredPrompt = null;
      var btn = document.getElementById('pwa-install-btn');
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (btn) btn.hidden = false;
      });
      if (btn) {
        btn.addEventListener('click', function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function () {
            deferredPrompt = null;
            btn.hidden = true;
          });
        });
      }
      window.addEventListener('appinstalled', function () {
        if (btn) btn.hidden = true;
      });
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
