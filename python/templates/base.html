<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Find trusted rental agents in Accra by neighborhood.{% endblock %}">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "includes/navbar.html" %}

  {% if messages %}
  <div class="container">
    {% for message in messages %}
    <div class="messages-flash {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

  <footer>
    <div class="container text-center">
      <p>Copyright {% now "Y" %} {{ SITE_NAME }}</p>
    </div>
  </footer>
  <script src="/static/js/area-search.js" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
